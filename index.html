<!DOCTYPE html>
<html>
<head>
  <title>Camera + Mic</title>
</head>
<body>

<h2>Camera + Microphone Access</h2>

<video id="video" autoplay playsinline width="300"></video>
<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="startMic()">Start Mic</button>

<script>
let stream;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });
    document.getElementById("video").srcObject = stream;
  } catch (err) {
    alert("Camera permission denied or error");
    console.error(err);
  }
}

async function startMic() {
  try {
    const audioStream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    console.log("Mic is working");
    
    // Optional: Listen to audio input
    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(audioStream);
    source.connect(audioContext.destination);

  } catch (err) {
    alert("Mic permission denied or error");
    console.error(err);
  }
}
</script>

</body>
</html>
